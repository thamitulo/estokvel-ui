<!-- notification-bell.component.html -->
<button mat-icon-button
        [matMenuTriggerFor]="notificationMenu"
        (menuOpened)="onMenuOpened()"
        (menuClosed)="onMenuClosed()"
        class="notification-bell">
  <mat-icon [matBadge]="unreadCount"
            matBadgeColor="warn"
            matBadgeSize="small"
            *ngIf="unreadCount > 0">
    notifications
  </mat-icon>
  <mat-icon *ngIf="unreadCount === 0">notifications</mat-icon>
</button>

<mat-menu #notificationMenu="matMenu" class="notification-menu">
  <div class="notification-header">
    <h3>Notifications</h3>
    <button mat-button color="primary" (click)="markAllAsRead()" *ngIf="unreadCount > 0">
      Mark all as read
    </button>
  </div>

  <div class="notification-list">
    <div class="loading-section" *ngIf="isLoading">
      <mat-spinner diameter="30"></mat-spinner>
      <span>Loading notifications...</span>
    </div>

    <div class="empty-state" *ngIf="!isLoading && notifications.length === 0">
      <mat-icon>notifications_off</mat-icon>
      <p>No notifications yet</p>
    </div>

    <div class="notification-item"
         *ngFor="let notification of notifications"
         [class.unread]="notification.isUnread"
         (click)="markAsRead(notification.id)">
      <div class="notification-icon" [ngClass]="getNotificationColor(notification.type)">
        <mat-icon>{{ getNotificationIcon(notification.type) }}</mat-icon>
      </div>
      <div class="notification-content">
        <div class="notification-title">
          <strong>{{ notification.title }}</strong>
          <span class="notification-time">{{ formatTime(notification.createdAt) }}</span>
        </div>
        <p class="notification-message">{{ notification.message }}</p>
        <a *ngIf="notification.actionUrl"
           [routerLink]="notification.actionUrl"
           class="notification-action">
          View details
        </a>
      </div>
      <div class="notification-status" *ngIf="notification.isUnread">
        <div class="unread-dot"></div>
      </div>
    </div>
  </div>

  <div class="notification-footer">
    <a mat-button routerLink="/notifications" class="view-all-btn">
      <mat-icon>list</mat-icon>
      View all notifications
    </a>
  </div>
</mat-menu>
