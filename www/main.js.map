<div class="top-bar">
  <div class="top-bar-content">
    <div class="top-bar-text">Take control of your future, start today!</div>
    <div class="top-bar-links">
      <a routerLink="/faq">Faqs</a>
      <a routerLink="/contact-us">Contact Us</a>
    </div>
  </div>
</div>


<mat-toolbar color="default" class="main-toolbar">
  <div class="toolbar-container">
    <div class="toolbar-left">
      <button mat-icon-button class="mobile-menu-button" (click)="toggleSidenav()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="logo-text" style="cursor: pointer;" (click)="navigate('/')">
        eStokvel
      </span>
    </div>

    <div class="desktop-menu">
      <button mat-button *ngFor="let item of visibleMenuItems"  [class.active-link]="isActive(item.route)"
              (click)="navigate(item.route)"> {{ item.label }}
      </button>
    </div>

    <span class="spacer"></span>

    <div class="toolbar-right">
      <div class="auth-buttons" *ngIf="!(auth.isAuthenticated$ | async)">
        <button mat-stroked-button color="primary" class="auth-button login-btn" (click)="login()">Log In</button>
        <button mat-raised-button color="primary" class="auth-button signup-btn" (click)="login()">Sign Up</button>
      </div>

      <!-- Show profile dropdown when authenticated -->
      <ng-container *ngIf="auth.user$ | async as user">
        <app-notification-bell></app-notification-bell>
        <button
          mat-button
          [matMenuTriggerFor]="profileMenu"
          class="profile-button"
        >
          My Profile
          <mat-icon>arrow_drop_down</mat-icon>
        </button>

        <mat-menu #profileMenu="matMenu" class="custom-profile-menu">
          <div class="profile-header">
            <ng-container *ngIf="user.picture; else fallbackAvatar">
              <img
                [src]="user.picture"
                alt="{{ user.name || user.nickname }}"
                class="profile-avatar"
              />
            </ng-container>

            <ng-template #fallbackAvatar>
              <div class="profile-avatar fallback-avatar">
                {{ (user.name || user.nickname)?.charAt(0) | uppercase }}
              </div>
            </ng-template>

            <div class="profile-info">
              <span class="greeting">Hi,</span>
              <span class="name">{{ user.name || user.nickname || 'there' }}</span>
            </div>
          </div>

          <mat-divider></mat-divider>

          <button mat-menu-item routerLink="/dashboard">
            <mat-icon>dashboard</mat-icon>
            <span>My Dashboard</span>
          </button>
          <button mat-menu-item routerLink="/create-stokvel">
            <mat-icon>add_circle</mat-icon>
            <span>Create Stokvel</span>
          </button>
          <button mat-menu-item routerLink="/stokvels">
            <mat-icon>groups</mat-icon>
            <span>Browse Stokvels</span>
          </button>
          <button mat-menu-item routerLink="/profile">
            <mat-icon>settings</mat-icon>
            <span>Account Settings</span>
          </button>
          <button mat-menu-item routerLink="/wallet">
            <mat-icon>account_balance_wallet</mat-icon>
            <span>My Wallet</span>
          </button>
          <button mat-menu-item routerLink="/refer-earn">
            <mat-icon>card_giftcard</mat-icon>
            <span>Refer &amp; Earn</span>
          </button>
          <button mat-menu-item routerLink="/help-center">
            <mat-icon>help_outline</mat-icon>
            <span>Help &amp; Support</span>
          </button>

          <mat-divider></mat-divider>

          <button mat-menu-item (click)="logout()" class="logout-item">
            <mat-icon color="warn">logout</mat-icon>
            <span>Logout</span>
          </button>
        </mat-menu>
      </ng-container>
    </div>
  </div>
</mat-toolbar>
